server.address=0.0.0.0
spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5433/plantsocial
spring.datasource.username=plantsocial_user
spring.datasource.password=plantsocial_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/plantsocial

# File Upload limits (files are stored in MinIO, not on disk)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# News API
news.api.url=https://newsapi.org/v2/everything
news.api.key=${NEWS_API_KEY:}

# Plant.net API Configuration
plantnet.api.key=${PLANTNET_API_KEY:}
plantnet.api.url=https://my-api.plantnet.org/v2/identify/all

# Plant.id API Configuration
app.plant-id.api-key=${PLANT_ID_API_KEY}
app.plant-id.base-url=https://plant.id/api/v3

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Centrifugo — HMAC secret used to sign connection tokens (must be ≥32 chars; must match Centrifugo server)
centrifugo.token.hmac-secret=${CENTRIFUGO_SECRET:xyla-centrifugo-hmac-secret-local-dev-key}
# Centrifugo HTTP API — used to publish real-time messages from the backend
centrifugo.api-url=http://localhost:8000/api
centrifugo.api-key=${CENTRIFUGO_API_KEY:plantsocial-internal-secret-key}

logging.file.name=/tmp/backend-plantsocial.log
logging.level.com.plantsocial=INFO

# MinIO / S3 Object Storage
xyla.storage.endpoint=http://localhost:9005
xyla.storage.access-key=${MINIO_ROOT_USER:minioadmin}
xyla.storage.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
xyla.storage.region=us-east-1
xyla.storage.bucket-name=plantsocial-media