server.address=0.0.0.0
spring.application.name=backend
spring.datasource.url=jdbc:postgresql://localhost:5433/plantsocial
spring.datasource.username=plantsocial_user
spring.datasource.password=plantsocial_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always

# JWT Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8082/realms/plantsocial

# File Upload
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# News API
news.api.url=https://newsapi.org/v2/everything
news.api.key=${NEWS_API_KEY:}

# PlantNet API Configuration
plantnet.api.key=${PLANTNET_API_KEY:}
plantnet.api.url=https://my-api.plantnet.org/v2/identify/all

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent