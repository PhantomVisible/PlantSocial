server:
  port: 9000

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/plantsocial
  cloud:
    gateway:
      default-filters:
        # Safety net: if any downstream service leaks its own CORS headers, keep only the first value
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:4200"
              - "http://192.168.1.250:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # WebSocket connections → Centrifugo real-time server
        - id: centrifugo-ws
          uri: ws://plantsocial_centrifugo:8000
          predicates:
            - Path=/connection/**
        # Chat REST API → chat-service (must come before backend_route to avoid /api/v1/** swallowing it)
        - id: chat-service-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/chat/**
        # Main monolith
        - id: backend_route
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/**
        - id: gamification_route
          uri: http://localhost:8081
          predicates:
            - Path=/api/gamification/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
