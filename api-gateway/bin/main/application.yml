server:
  port: 9000

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/plantsocial
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: backend_route
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/**
        - id: gamification_route
          uri: http://localhost:8081
          predicates:
            - Path=/api/gamification/**
        - id: chat_websocket_route
          uri: http://localhost:8083
          predicates:
            - Path=/ws/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
