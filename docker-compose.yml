services:
  # 1. My Main Database
  postgres:
    image: postgres:16
    container_name: plantsocial_db
    environment:
      POSTGRES_DB: plantsocial
      POSTGRES_USER: plantsocial_user
      POSTGRES_PASSWORD: plantsocial_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The New Auth Database (Strictly for Keycloak)
  keycloak-db:
    image: postgres:16
    container_name: plantsocial_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432" # Mapped to 5434 to avoid clashing with my main DB on 5433
    volumes:
      - keycloak_data:/var/lib/postgresql/data

  # 3. The IAM Auth Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: plantsocial_keycloak
    command: start-dev # Runs Keycloak in development mode
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8082:8080" # Maps Keycloak UI to localhost:8082
    depends_on:
      - keycloak-db

volumes:
  postgres_data:
  keycloak_data: