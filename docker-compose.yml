services:
  # 1. My Main Database
  postgres:
    image: postgres:16
    container_name: plantsocial_db
    environment:
      POSTGRES_DB: plantsocial
      POSTGRES_USER: plantsocial_user
      POSTGRES_PASSWORD: plantsocial_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - plantsocial_net

  # 2. The New Auth Database (Strictly for Keycloak)
  keycloak-db:
    image: postgres:16
    container_name: plantsocial_keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432" # Mapped to 5434 to avoid clashing with my main DB on 5433
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - plantsocial_net

  # 3. The IAM Auth Service
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: plantsocial_keycloak
    command: start-dev # Runs Keycloak in development mode
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Pin the issuer hostname so every JWT always has iss=http://localhost:8082/realms/plantsocial,
      # regardless of whether Keycloak is hit from the host or from inside Docker via the container name.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8082
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8082:8080" # Maps Keycloak UI to localhost:8082
    volumes:
      - ./keycloak-theme/plantsocial:/opt/keycloak/themes/plantsocial
    depends_on:
      - keycloak-db
    networks:
      - plantsocial_net

  # 4. Redis for Pub/Sub (shared by chat-service and Centrifugo)
  redis:
    image: redis:7-alpine
    container_name: plantsocial_redis
    ports:
      - "6379:6379"
    networks:
      - plantsocial_net

  # 5. MinIO Object Storage (S3-compatible, used for avatars, post images, etc.)
  minio:
    image: minio/minio:latest
    container_name: plantsocial_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9005:9000"   # S3 API (host:9005 → container:9000; avoids collision with API Gateway on 9000)
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    networks:
      - plantsocial_net

  # 6. Centrifugo Real-time Messaging Server
  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: plantsocial_centrifugo
    command: centrifugo --config config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json
    ports:
      - "8000:8000"   # Client WebSocket / HTTP API
    environment:
      # Overrides token_hmac_secret_key in config.json — must match CENTRIFUGO_SECRET in backend env
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_SECRET:-xyla-centrifugo-hmac-secret-local-dev-key}
    depends_on:
      - redis
      - keycloak
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - plantsocial_net

networks:
  plantsocial_net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
  minio_data: