<div class="marketplace-container">
    <div class="header">
        <h1>Marketplace</h1>
        <div class="actions">
            <button class="pro-btn" *ngIf="!isAlreadyPro" (click)="openProModal()">
                <i class="pi pi-crown"></i> Become Pro
            </button>
            <span class="pro-badge-active" *ngIf="isAlreadyPro">
                <i class="pi pi-crown"></i> Pro
            </span>
            <button class="seller-hub-btn" *ngIf="isAlreadyPro" routerLink="/marketplace/dashboard">
                <i class="pi pi-chart-bar"></i> Seller Hub
            </button>
            <button class="create-btn" (click)="createListing()">
                <i class="pi pi-plus"></i> List Your Plant Product
            </button>
        </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
        <i class="pi pi-search"></i>
        <input type="text" placeholder="Search listings…"
            [value]="searchQuery()"
            (input)="searchQuery.set($any($event.target).value)">
        <button *ngIf="searchQuery()" class="clear-btn" (click)="searchQuery.set('')">
            <i class="pi pi-times"></i>
        </button>
    </div>

    <div *ngIf="loading()" class="loading">
        <p>Loading market data...</p>
    </div>

    <div *ngIf="!loading() && filteredListings().length === 0" class="empty-state">
        <i class="pi pi-shopping-bag"></i>
        <p *ngIf="searchQuery()">No listings match "{{ searchQuery() }}"</p>
        <p *ngIf="!searchQuery()">No active listings. Be the first to sell!</p>
    </div>

    <div class="listings-grid" *ngIf="!loading()">
        <div class="listing-card" *ngFor="let item of filteredListings()" [routerLink]="['/marketplace/listing', item.id]">
            <div class="image-wrapper">
                <img [src]="getImageUrl(item.imageUrl)" [alt]="item.title"
                    onerror="this.src='/assets/placeholder-plant.jpg'" referrerpolicy="no-referrer">
                <div class="price-badge" *ngIf="item.productPrice">{{ item.productPrice | currency:'USD' }}</div>
                <div class="price-badge" *ngIf="!item.productPrice">Price N/A</div>
            </div>
            <div class="card-content">
                <h3>{{ item.title }}</h3>
                <div class="seller-row">
                    <span class="seller">&#64;{{ item.userHandle }}</span>
                    <app-pro-badge *ngIf="item.userSubscriptionTier === 'PRO'"></app-pro-badge>
                </div>
                <div class="meta-row">
                    <span class="duration"><i class="pi pi-calendar"></i> {{ item.durationDays }} days</span>
                </div>
            </div>
        </div>
    </div>
</div>

<app-pro-upgrade-modal
    *ngIf="showProModal()"
    (closed)="showProModal.set(false)">
</app-pro-upgrade-modal>
